<!doctype html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Mackbear Admin</title>
  <script src="https://identity.netlify.com/v1/netlify-identity-widget.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #f6f3ee;
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .box {
      background: white;
      padding: 32px;
      border-radius: 16px;
      box-shadow: 0 10px 30px rgba(0,0,0,0.08);
      text-align: center;
      max-width: 420px;
      width: calc(100% - 32px);
    }
    h1 {
      margin-top: 0;
      margin-bottom: 12px;
    }
    p {
      color: #555;
      margin-bottom: 20px;
      line-height: 1.5;
    }
    .note {
      font-size: 14px;
      color: #777;
      margin-top: 16px;
    }
    [data-netlify-identity-menu] a,
    [data-netlify-identity-button] {
      display: inline-block;
      margin-top: 8px;
      padding: 12px 20px;
      border-radius: 10px;
      background: #2f241d;
      color: #fff !important;
      text-decoration: none;
      font-weight: 700;
      cursor: pointer;
    }
  </style>
</head>
<body>
  <div class="box">
    <h1>Admin Giriş</h1>
    <p>
      İlk kurulum için önce hesap oluştur, sonra giriş yap.
    </p>

    <div data-netlify-identity-menu></div>
    <div style="margin-top: 12px;" data-netlify-identity-button>Giriş / Kayıt</div>

    <p class="note">
      Giriş yaptıktan sonra CMS otomatik açılacak.
    </p>
  </div>

  <script>
    if (window.netlifyIdentity) {
      window.netlifyIdentity.on("login", function () {
        document.location.href = "/admin/";
      });
    }
  </script>

  <script src="https://unpkg.com/decap-cms@^3.0.0/dist/decap-cms.js"></script>
</body>
</html>
